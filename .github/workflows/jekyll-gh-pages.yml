  <h1>Privacy Policy for BarkaApp</h1>
  <p><strong>Last updated:</strong> October 4, 2026</p>

  <p>BarkaApp ("we", "us", "our") is a social app with chat, posts, groups, marketplace, and profiles. This policy explains what data we collect and how we use it.</p>

  <h2>1. Information We Collect</h2>
  <p>When you use BarkaApp, we collect:</p>
  <ul>
    <li><strong>Account info:</strong> Email address, username, profile image, about text, password stored securely via Firebase Authentication.</li>
    <li><strong>Social content:</strong> Posts, comments, likes, messages, group chats, and friend lists you create.</li>
    <li><strong>Marketplace data:</strong> Listings, messages, and activity in the Gumama place section.</li>
    <li><strong>Verification data:</strong> Business and school documents or info you submit for verification. This is used only for verification and deleted after review.</li>
    <li><strong>Device & usage data:</strong> Device model, OS version, crash logs, and app usage via Firebase Analytics and Crashlytics.</li>
    <li><strong>Advertising data:</strong> Collected by Google AdMob to show ads. This may include advertising ID and approximate location.</li>
  </ul>

  <h2>2. How We Use Your Information</h2>
  <p>We use the data to:</p>
  <ul>
    <li>Enable chat, posting, commenting, and group features</li>
    <li>Manage friend connections and user profiles</li>
    <li>Run the Gumama place marketplace and display listings</li>
    <li>Review and process verification requests for businesses and schools</li>
    <li>Show personalized and non-personalized ads through Google AdMob</li>
    <li>Monitor app performance, fix bugs, and improve features via Firebase</li>
  </ul>

  <h2>3. Data Storage & Security</h2>
  <p>Your data is stored on Google Firebase servers with encryption in transit and at rest. We use Firebase Security Rules to restrict access. We do not sell your personal data.</p>

  <h2>4. Third Parties</h2>
  <p>BarkaApp uses:</p>
  <ul>
    <li><strong>Firebase</strong> by Google for authentication, database, storage, analytics, and crash reporting</li>
    <li><strong>Google AdMob</strong> for advertising</li>
  </ul>
  <p>These services have their own privacy policies:</p>
  <ul>
    <li>Google Privacy Policy: <a href="https://policies.google.com/privacy">https://policies.google.com/privacy</a></li>
    <li>AdMob Privacy Policy: <a href="https://support.google.com/admob/answer/6128543">https://support.google.com/admob/answer/6128543</a></li>
  </ul>

  <h2>5. Account & Data Deletion</h2>
  <p>You can delete your account and all associated data from within the app: <strong>Profile > Settings > Delete Account</strong>.<br>
  You can also request deletion by emailing us at <strong>[Your Contact Email]</strong>. We will delete your data within 30 days, except where required by law.</p>

  <h2>6. Children’s Privacy</h2>
  <p>BarkaApp is not intended for users under 13. If you believe a child under 13 has provided personal data, contact us and we will delete it.</p>

  <h2>7. Changes to This Policy</h2>
  <p>We may update this policy. We will notify you by updating the "Last updated" date at the top.</p>

  <h2>8. Contact Us</h2>
  <p>If you have questions about this policy or your data, contact us at:<br>
  Email: <strong>[barkaapp568@gmail.com ]</strong></p>
